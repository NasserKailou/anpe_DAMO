# nginx.conf personnalisé pour Plesk
# Placez ce fichier dans le répertoire racine du domaine sur le VPS
# Plesk l'inclut automatiquement dans sa configuration nginx
#
# Résout le problème HTTP 428 sur les fichiers statiques (assets)
#
# Sur Plesk : Domains > votredomaine > Apache & nginx Settings
#             → Additional nginx directives (HTTP) : coller le contenu ci-dessous
# OU
# Placez ce fichier dans /var/www/vhosts/votre-domaine.com/conf/nginx.conf

# Autoriser tous les assets statiques directement sans proxy Apache
location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot|map)$ {
    root /var/www/vhosts/affectionate-lumiere.217-154-60-93.plesk.page/httpdocs/public;
    expires 30d;
    add_header Cache-Control "public, immutable";
    add_header X-Served-By "nginx-direct";
    try_files $uri $uri/ =404;
}
